<script type="text/babel" data-presets="react">
function MasterProducts() {
  const cats = listCategories();
  return (
    <section className="catalog-page">
      <div className="container">
        <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Products" }]}/>
        <header className="cat-hero" data-reveal>
          <span className="eyebrow">Browse the catalog</span>
          <h1 className="display">Every room, in one shop.</h1>
          <p className="cat-lede">
            Eight categories of custom millwork built on the same bench. Click a category for the filterable grid, or jump straight into a section.
          </p>
        </header>

        <div className="master-grid">
          {cats.map((cat, i) => (
            <article key={cat.slug} className="master-card" data-reveal
              style={{ "--delay": `${i * 60}ms` }}>
              <a href={`/${cat.slug}`} className="master-card-head">
                <div className="master-card-thumb ph"
                     style={{ background: `linear-gradient(160deg, ${["#3B2A1E","#5B4434","#7a3a23","#7E8B6F","#26211c","#B85A3F","#3B2A1E","#5B4434"][i % 8]}, #1c130a)` }}>
                  <CabinetOverlay opacity={0.28}/>
                </div>
                <div className="master-card-meta">
                  <span className="master-card-num">0{i + 1}</span>
                  <span className="master-card-arrow">→</span>
                </div>
                <h2 className="display">{cat.title}</h2>
                <p>{cat.short}</p>
              </a>
              <div className="master-card-secs">
                {Object.values(cat.sections).map(sec => (
                  <a key={sec.slug} href={`/${cat.slug}/${sec.slug}`} className="master-card-sec">
                    {sec.title}
                  </a>
                ))}
              </div>
              <a href={`/${cat.slug}`} className="master-card-all link-underline">
                View all {cat.title} →
              </a>
            </article>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <MasterProducts/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

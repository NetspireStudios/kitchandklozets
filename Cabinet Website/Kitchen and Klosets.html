<script type="text/babel" data-presets="react">
function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);

  // Global reveal observer for any [data-reveal] outside of useReveal hooks.
  // MUST have [] deps; without them, the effect tears down and recreates the
  // observer on every render before its initial async callback can fire.
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add("in-view");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  // Close drawer on resize past breakpoint
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main>
        <Hero/>
        <Services/>
        <ByTheBench/>
        <WoodLibrary/>
        <Workshop/>
        <Testimonials/>
        <MapGallery/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

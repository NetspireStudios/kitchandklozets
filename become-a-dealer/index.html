<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "url": "https://kitchandklozets.com/become-a-dealer",
  "name": "Become a Dealer",
  "description": "Apply to become a Kitch & Klozets RTA cabinet wholesale dealer.",
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://kitchandklozets.com/" },
      { "@type": "ListItem", "position": 2, "name": "Become a Dealer" }
    ]
  }
}
</script>
</head>
<body style="background-color: rgb(250, 238, 223)">
<a href="#top" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to content</a>
<div id="root"></div>

<script type="text/babel" src="/data.jsx"></script>
<script type="text/babel" src="/catalog-data.jsx"></script>
<script type="text/babel" src="/utils.jsx"></script>
<script type="text/babel" src="/top.jsx"></script>
<script type="text/babel" src="/middle.jsx"></script>
<script type="text/babel" src="/bottom.jsx"></script>
<script type="text/babel" src="/catalog.jsx"></script>

<script type="text/babel" data-presets="react">
function DealerForm() {
  const [state, setState] = React.useState({
    company: "", contactName: "", email: "", phone: "",
    role: "", website: "", state: "", volume: "",
    notes: "", honey: ""
  });
  const [sent, setSent] = React.useState(false);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const update = (k) => (e) => setState({ ...state, [k]: e.target.value });

  const onSubmit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null);
    try {
      const endpoint = (typeof window !== "undefined" && window.CONTACT_ENDPOINT) || "/api/contact";
      const r = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ...state,
          product: "Dealer application",
          category: "Become a Dealer",
          name: state.contactName,
          message: `Company: ${state.company}\nRole: ${state.role}\nWebsite: ${state.website}\nState: ${state.state}\nEstimated annual volume: ${state.volume}\n\nNotes:\n${state.notes}`
        })
      });
      if (!r.ok) {
        let msg = "Submission failed.";
        try { const j = await r.json(); if (j && j.error) msg = j.error; } catch (_) {}
        throw new Error(msg);
      }
      setSent(true);
    } catch (e2) {
      setErr(e2.message + " Please email sales@kitchandklozets.com or call (548) 333-1419.");
    } finally {
      setBusy(false);
    }
  };

  if (sent) {
    return (
      <div className="contact-form-thanks">
        <h3 className="display">Application received.</h3>
        <p>Thanks, <b>{state.contactName || "thanks for applying"}</b>. We review applications in the order they arrive; you'll hear back from a real person within one business day at <b>{state.email}</b> with your price book and the first-order checklist.</p>
      </div>
    );
  }

  return (
    <form className="contact-form" onSubmit={onSubmit} noValidate>
      <input type="text" name="honey" autoComplete="off" tabIndex="-1" aria-hidden="true"
        value={state.honey} onChange={update("honey")}
        style={{ position: "absolute", left: "-9999px", width: "1px", height: "1px", opacity: 0 }}/>

      <div className="cf-row">
        <label className="cf-field">
          <span>Company / business name</span>
          <input required type="text" value={state.company} onChange={update("company")}/>
        </label>
        <label className="cf-field">
          <span>Contact name</span>
          <input required type="text" value={state.contactName} onChange={update("contactName")}/>
        </label>
      </div>

      <div className="cf-row">
        <label className="cf-field">
          <span>Business email</span>
          <input required type="email" value={state.email} onChange={update("email")}/>
        </label>
        <label className="cf-field">
          <span>Phone</span>
          <input required type="tel" value={state.phone} onChange={update("phone")}/>
        </label>
      </div>

      <div className="cf-row">
        <label className="cf-field">
          <span>Your role</span>
          <select value={state.role} onChange={update("role")} required>
            <option value="">Select…</option>
            <option>Cabinet dealer / showroom</option>
            <option>Kitchen &amp; bath designer</option>
            <option>General contractor / builder</option>
            <option>Property manager / flipper</option>
            <option>Other</option>
          </select>
        </label>
        <label className="cf-field">
          <span>State / province</span>
          <input type="text" value={state.state} onChange={update("state")} placeholder="e.g. MA, NH, NY"/>
        </label>
      </div>

      <div className="cf-row">
        <label className="cf-field">
          <span>Website <small>(optional)</small></span>
          <input type="url" value={state.website} onChange={update("website")} placeholder="https://"/>
        </label>
        <label className="cf-field">
          <span>Estimated annual volume</span>
          <select value={state.volume} onChange={update("volume")}>
            <option value="">Select…</option>
            <option>Under 25 kitchens / year</option>
            <option>25–75 kitchens / year</option>
            <option>75–200 kitchens / year</option>
            <option>200+ kitchens / year</option>
          </select>
        </label>
      </div>

      <label className="cf-field">
        <span>Anything else we should know?</span>
        <textarea rows="4" value={state.notes} onChange={update("notes")}
          placeholder="Markets you serve, lines you currently carry, what's missing in your current supplier mix..."/>
      </label>

      <div className="cf-submit-row">
        <button type="submit" className="btn btn-walnut" disabled={busy}>
          {busy ? "Sending..." : (<>Submit application <span className="arrow">→</span></>)}
        </button>
        <p className="cf-tiny">Reviewed within one business day. We don't share your details. Replies come from sales@kitchandklozets.com.</p>
      </div>

      {err && <p className="cf-error">{err}</p>}
    </form>
  );
}

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  const perks = [
    { eyebrow: "Pricing", title: "Tiered wholesale book", blurb: "Three tiers based on annual volume. Once you're set, your unit cost holds for the calendar year, regardless of where commodity prices move." },
    { eyebrow: "Lead time", title: "3–5 weeks on every line", blurb: "We hold inventory on the eight RTA finish lines. Orders ship from the Watertown warehouse on a fixed Monday-through-Friday rotation." },
    { eyebrow: "Support", title: "One account rep, no call queue", blurb: "Every dealer gets a direct email and phone line to a real person on the team. No tickets. No phone tree. If a box arrives short, we know about it the same day." },
    { eyebrow: "Margins", title: "Resell, install, or both", blurb: "Sell flat-packed and pocket the install margin yourself, or have us white-label install through our partner network if you're not running a crew." }
  ];

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Become a Dealer" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">Wholesale dealer program</span>
              <h1 className="display">Carry the line.</h1>
              <p className="cat-lede">
                A small dealer program, on purpose. Tiered pricing locked in for the year, three-to-five-week lead times across all eight RTA finish lines, and a real person on the phone the first time you call. Apply in two minutes.
              </p>
            </header>

            <div className="why-grid" data-reveal>
              {perks.map((p, i) => (
                <article key={i} className="why-card" style={{ "--delay": `${i * 80}ms` }}>
                  <span className="why-num">0{i + 1}</span>
                  <span className="eyebrow">{p.eyebrow}</span>
                  <h3 className="display">{p.title}</h3>
                  <p>{p.blurb}</p>
                </article>
              ))}
            </div>

            <div className="product-form-section" id="apply" data-reveal style={{ marginTop: 56 }}>
              <div className="product-form-head">
                <span className="eyebrow">Apply · two minutes</span>
                <h2 className="display">Send us your business details.</h2>
                <p>Reviewed within one business day. We send back a price book, an order PDF, and the start of an account at the tier that fits your volume.</p>
              </div>
              <DealerForm/>
            </div>
          </div>
        </section>

        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

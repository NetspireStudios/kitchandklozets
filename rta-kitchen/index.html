<script type="text/babel" data-presets="react">
const RTA_SPECS = [
  { eyebrow: "Construction",  title: "Plywood box, solid-hardwood fronts",
    blurb: "All-wood construction. No MDF carcass. Dovetailed drawer boxes on undermount soft-close slides, soft-close hinges across every line." },
  { eyebrow: "Lead time",     title: "Three to five weeks, every line",
    blurb: "Stocked inventory across the eight finishes. Orders ship from the Sudbury warehouse on a fixed Monday-through-Friday rotation." },
  { eyebrow: "Assembly",      title: "Under 30 minutes per box",
    blurb: "Cam-lock construction with a clear assembly sheet. Bottom panel, sides, back, top rails, drawer slides — five steps, no surprises." },
  { eyebrow: "Warranty",      title: "Five-year warranty",
    blurb: "Five years on the joint, the finish, and the hardware. Replacement parts ship from stock the same week." }
];

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  const cat = CATALOG["rta-kitchen"];
  // Finishes live under sections (each one carries plywood + particle products).
  const finishes = cat.sections ? Object.values(cat.sections) : (cat.products || []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "RTA Kitchen" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">RTA Kitchen · dealer-direct</span>
              <h1 className="display">Seven finishes, plywood or particle.</h1>
              <p className="cat-lede">
                Ready-to-assemble kitchen cabinets in seven finish lines, each offered in plywood or particle board. Solid-hardwood doors and drawer fronts, dovetailed drawer boxes on soft-close undermount slides. Three to five-week lead time. Five-year warranty on every line.
              </p>
              <div className="hero-ctas" style={{ marginTop: 28 }}>
                <a className="btn btn-walnut" href="/contact">Request a quote <span className="arrow">→</span></a>
                <a className="btn btn-ghost" href="tel:+15483331419">Call (548) 333-1419</a>
              </div>
            </header>

            <div className="rta-grid" data-reveal>
              {finishes.map((f, i) => (
                <a key={f.slug} href={`/rta-kitchen/${f.slug}`}
                   className="rta-card" style={{ "--delay": `${i * 50}ms` }}>
                  <div className="rta-thumb ph"
                       style={{ background: "linear-gradient(160deg, #3B2A1E, #1c130a)" }}>
                    {f.img
                      ? <Img src={f.img} alt={f.title} w={600}/>
                      : <CabinetOverlay opacity={0.28}/>}
                  </div>
                  <div className="rta-meta">
                    <span className="rta-num">0{i + 1}</span>
                    <span className="rta-arrow">→</span>
                  </div>
                  <h3 className="display">{f.title}</h3>
                  <p>{f.blurb}</p>
                </a>
              ))}
            </div>

            <div className="closet-specs" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">What's in the line</span>
                <h2 className="display">Built to a single hardware spec.</h2>
              </header>
              <div className="closet-specs-grid">
                {RTA_SPECS.map((s, i) => (
                  <div key={i} className="closet-spec-card">
                    <span className="eyebrow">{s.eyebrow}</span>
                    <h3 className="display">{s.title}</h3>
                    <p>{s.blurb}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main>
        <WholesaleHero/>
        <WhyChoose/>
        <RTAShowcase/>
        <ProductsStrip
          eyebrow="Closet Line"
          title="Walk-ins, reach-ins, wardrobe walls."
          hint="Closet systems that ship in the same week as your kitchen order, on the same truck. Six configurations cover most builds."
          picks={[
            { cat: "closet-line", slug: "walk-in-closet-with-island" },
            { cat: "closet-line", slug: "his-and-hers-walk-in" },
            { cat: "closet-line", slug: "wardrobe-wall" }
          ]}
          allHref="/closet-line"/>
        <ProductsStrip
          eyebrow="Crafted Cabinets · signature line"
          title="When the room won't fit a flat-pack kit."
          hint="Built-to-measure cabinetry from the same shop. For dealers who want a custom tier alongside the RTA program, or for homeowners we work with directly."
          picks={[
            { cat: "crafted-cabinets", slug: "custom-kitchen" },
            { cat: "crafted-cabinets", slug: "custom-bath-vanity" },
            { cat: "crafted-cabinets", slug: "custom-mudroom" }
          ]}
          allHref="/crafted-cabinets"/>
        <OrderSteps/>
        <FAQ/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

<script type="text/babel" data-presets="react">
function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Projects" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">Project gallery</span>
              <h1 className="display">Recent work, coming soon.</h1>
              <p className="cat-lede">
                We're putting together the project gallery now. Each entry will show the room before, the drawings, the materials chosen, and a few install photos. Until it's live, the polaroid stack on the home page is a good representative slice of what we build.
              </p>
            </header>

            <div className="projects-placeholder" data-reveal>
              <div className="projects-placeholder-card">
                <span className="eyebrow">In the meantime</span>
                <h3 className="display">Want to see the work in person?</h3>
                <p>Our Sudbury shop runs walk-throughs by appointment. Bring a floor plan or photos of the room you're thinking about; we'll talk it through at the bench.</p>
                <div className="projects-placeholder-ctas">
                  <a className="btn btn-walnut" href="/contact">Book a visit <span className="arrow">→</span></a>
                  <a className="btn btn-ghost" href="tel:+15483331419">Call (548) 333-1419</a>
                </div>
              </div>
            </div>
          </div>
        </section>

        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

<script type="text/babel" data-presets="react">
function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "About" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">The shop &middot; established 2025</span>
              <h1 className="display">A cabinet program with two doors.</h1>
              <p className="cat-lede">
                Kitch &amp; Klozets runs two products out of the same Sudbury, ON warehouse. One is the RTA dealer line: eight finish lines of ready-to-assemble kitchen cabinets and a closet system, shipped to dealers across Ontario and Eastern Canada on a fixed lead time. The other is Crafted Cabinets: built-to-measure rooms in solid hardwood, sold direct to homeowners and offered to dealers as a custom tier. Same crew runs both.
              </p>
            </header>

            <div className="about-pillars" data-reveal>
              <div className="about-pillar">
                <span className="eyebrow">Wholesale</span>
                <h3 className="display">A real dealer program</h3>
                <p>Tiered pricing locked for the year, three-to-five-week lead times, one dedicated account rep per dealer. No territory exclusivity, no minimum order to start.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Made-to-measure</span>
                <h3 className="display">Crafted side, room by room</h3>
                <p>When the room won&apos;t fit a flat-pack kit. Solid-hardwood cabinetry drawn to the floor plan, finished in the shop, installed by the team that built it.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Warranty</span>
                <h3 className="display">Five-year coverage, both lines</h3>
                <p>Five years on the joint, the finish, and the hardware, on both the RTA program and the Crafted side. Replacement parts ship from stock the same week they're requested.</p>
              </div>
            </div>
          </div>
        </section>

        <ByTheBench/>
        <Workshop/>
        <Testimonials/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

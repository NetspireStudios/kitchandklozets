<script type="text/babel" data-presets="react">
function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "About" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">The shop &middot; established 2025</span>
              <h1 className="display">Cabinets, two ways.</h1>
              <p className="cat-lede">
                Kitch &amp; Klozets carries two product lines, both shipped from the GTA. The RTA cabinet program covers eight finish lines of ready-to-assemble kitchens and a closet system across Ontario. The finished kitchens are sourced from Oppein, our factory partner, and delivered ready to install.
              </p>
            </header>

            <div className="about-pillars" data-reveal>
              <div className="about-pillar">
                <span className="eyebrow">RTA cabinets</span>
                <h3 className="display">Eight finishes, ready to ship</h3>
                <p>Ready-to-assemble kitchen cabinets in eight finish lines, plus a closet system. Sold to homeowners and dealers, shipped from the GTA, typical lead time three to five weeks.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Finished kitchens</span>
                <h3 className="display">From Oppein, ready to install</h3>
                <p>Complete kitchens built at the Oppein factory and delivered finished. Skip the on-site build and the long custom-shop lead time.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Samples</span>
                <h3 className="display">Real finish chips on request</h3>
                <p>Sample doors and finish chips ship to your door so you can see the colour in your own light before committing to the order.</p>
              </div>
            </div>
          </div>
        </section>

        <ByTheBench/>
        <Testimonials/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script type="text/babel" data-presets="react">
function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "About" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">The workshop · since 2008</span>
              <h1 className="display">A six-person cabinet shop in Watertown.</h1>
              <p className="cat-lede">
                Kitch &amp; Klozets is a family-run cabinetmaker building custom kitchens, closets, vanities, and built-ins out of solid hardwood. Founded in 2008, in our Watertown, Massachusetts shop, on the same bench every cabinet still leaves through. We design, build, finish, and install every piece in-house. No outsourced joinery, no subcontracted finishing, no flat-pack carcasses.
              </p>
            </header>

            <div className="about-pillars" data-reveal>
              <div className="about-pillar">
                <span className="eyebrow">In-house</span>
                <h3 className="display">Design through install</h3>
                <p>One project manager from the first coffee to the last adjustment. The crew that draws your kitchen is the crew that builds it.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Materials</span>
                <h3 className="display">Solid hardwood, locally sourced</h3>
                <p>Six FSC-certified species, all from mills within 300 miles of the shop. No plywood face frames; no MDF substrate.</p>
              </div>
              <div className="about-pillar">
                <span className="eyebrow">Warranty</span>
                <h3 className="display">10 years on every joint</h3>
                <p>If a joint we cut ever fails in normal use, we come back and fix it. Hardware, finish, the whole assembly.</p>
              </div>
            </div>
          </div>
        </section>

        <ByTheBench/>
        <Workshop/>
        <Testimonials/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

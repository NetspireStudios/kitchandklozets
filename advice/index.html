<script type="text/babel" data-presets="react">
const ADVICE_TOPICS = [
  { tag: "Buyer's guide",  title: "RTA vs Custom Kitchen Cabinets: How to Choose for Your Ontario Kitchen",
    blurb: "A practical walk through cost, lead time, fit, and quality for Ontario kitchen renovations. When to pick ready-to-assemble, when to spec a built-to-measure crafted program.",
    href: "/advice/rta-vs-custom-kitchen-cabinets-ontario",
    img: "/assets/finishes/white-shaker-hero.jpg" },
  { tag: "Finishes guide", title: "Eight Kitchen Cabinet Finishes Compared",
    blurb: "Slim shaker, single shaker, navy, grey, natural oak, smoked oak, and high gloss side by side. Stile widths, paint tone, grain reads, and which hardware fits each finish.",
    href: "/advice/white-kitchen-cabinet-finishes-compared",
    img: "/assets/finishes/white-slim-shaker-hero.jpg" },
  { tag: "Planning",       title: "Kitchen Cabinet Lead Times in Ontario: What to Expect",
    blurb: "A week-by-week timeline for RTA and built-to-measure orders, plus the three things that slow a kitchen renovation down and how to sequence the trades around the cabinet schedule.",
    href: "/advice/kitchen-cabinet-lead-times-ontario",
    img: "/assets/home/home-hero.jpg" }
];

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Advice & Tips" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">Trade notes &middot; advice &amp; tips</span>
              <h1 className="display">Short notes from the warehouse.</h1>
              <p className="cat-lede">
                Install sequences, finish-care notes, sourcing decisions, project guidance. The point of this page is to save you a phone call &mdash; or to give you the answer fast when the call comes from a customer.
              </p>
            </header>

            <div className="advice-grid" data-reveal>
              {ADVICE_TOPICS.map((t, i) => {
                const isLink = !!t.href;
                const inner = (
                  <>
                    {t.img ? (
                      <div className="advice-card-img">
                        <img src={t.img} alt={t.title} loading="lazy"/>
                      </div>
                    ) : null}
                    <span className="advice-tag">{t.tag}</span>
                    <h2 className="display">{t.title}</h2>
                    <p>{t.blurb}</p>
                    <span className="advice-meta">{isLink ? "Read the post →" : "Full note coming soon →"}</span>
                  </>
                );
                return isLink ? (
                  <a key={i} href={t.href}
                     className="advice-card advice-card-link"
                     style={{ "--delay": `${i * 60}ms` }}>
                    {inner}
                  </a>
                ) : (
                  <article key={i} className="advice-card"
                           style={{ "--delay": `${i * 60}ms` }}>
                    {inner}
                  </article>
                );
              })}
            </div>

            <div className="projects-placeholder" data-reveal style={{ marginTop: 56 }}>
              <div className="projects-placeholder-card">
                <span className="eyebrow">Question we should answer next?</span>
                <h3 className="display">Let us know what your customers keep asking.</h3>
                <p>We add notes as they come up. If there's a specific question worth a longer write-up, send it in and we'll write it for the next round.</p>
                <div className="projects-placeholder-ctas">
                  <a className="btn btn-walnut" href="/contact">Suggest a topic <span className="arrow">&rarr;</span></a>
                  <a className="btn btn-ghost" href="mailto:sales@kitchandklozets.com">Email sales</a>
                </div>
              </div>
            </div>
          </div>
        </section>

        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

              <header className="blog-post-head">
                <span className="eyebrow">Buyer's guide · Ontario</span>
                <h1 className="display">RTA vs Custom Kitchen Cabinets: How to Choose for Your Ontario Kitchen</h1>
                <p className="blog-post-deck">
                  Most kitchen renovations in Ontario come down to one decision before anything else gets specified: ready-to-assemble (RTA), or finished kitchens delivered ready to install. Both come from Oppein, our manufacturing partner, and both ship from the GTA. Here is how we walk homeowners and dealers through the choice.
                </p>
                <div className="blog-post-meta">
                  <span>By Kitch &amp; Klozets</span>

                  <time dateTime="2026-05-16">May 16, 2026</time>

              <div className="blog-post-body">
                <h2>The short answer</h2>
                <p>
                  Both lines are made by Oppein, the world's largest cabinetry manufacturer. The RTA program flat-packs each cabinet so it can be shipped quickly and assembled on site by an installer or a confident homeowner. The Crafted line ships pre-assembled and finished, ready to install. Both use the same hardware specs and carry the same factory five-year warranty.
                </p>

                <h2>What RTA actually is</h2>
                <p>
                  RTA stands for ready-to-assemble. The cabinet boxes ship flat in cardboard and the hardware arrives in labelled bags so the assembly happens on site rather than at the factory. The Kitch &amp; Klozets RTA program runs in seven finish lines plus an accessories program. Box widths follow standard stepped increments from 9" through 36" for base cabinets and corresponding widths on wall and pantry boxes.
                </p>
                <p>
                  Construction is straightforward. Plywood option uses 3/4" plywood for shelves and side panels with a 5mm reinforced back panel. Particle option uses particle board across the carcass with the same door and hardware spec. Hardware on both is the six-way soft-close hinge system with full-access soft-closing drawers on concealed slides and adjustable legs from 4 1/4" to 5 1/4". Both come with Oppein's standard five-year warranty.
                </p>

                <h2>What "Crafted" means here</h2>
                <p>
                  Crafted Cabinets is the finished-kitchen line. The cabinets are built and finished at the Oppein factory and delivered as a complete set, sized to the floor plan. Skip the on-site assembly and the long custom-shop lead time. Same hardware, same warranty as the RTA line; the difference is that the boxes arrive built and the order is sized to the room rather than picked off a fixed-width catalog.
                </p>

                <h2>Cost comparison</h2>
                <p>
                  Both lines are quoted against the actual floor plan rather than a generic per-foot number. RTA is the more budget-friendly option because the assembly labour is on the install side rather than the factory side. Crafted prices higher because the cabinets arrive built and finished. We send a written quote against your room dimensions; ask sales for current numbers because pricing moves with the manufacturer's input costs and the freight market.
                </p>

                <h2>Lead time</h2>
                <p>
                  RTA orders ship in three to five weeks from PO to delivery. Crafted finished kitchens run roughly eight to twelve weeks depending on the configuration and which finishes are in stock at the factory. Both ship from the GTA. If you have a firm install date, place the PO at least a week or two before the quoted window so transit delays or a damaged-shipment replacement do not push the install back.
                </p>

                <h2>Fit</h2>
                <p>
                  RTA programs work in standard stepped increments. Filler strips pick up the leftover inches at the ends of a run. That is fine for most rooms; it is less ideal when a room has a slanted ceiling, a heritage window casing that cuts into a run, or a column that needs to be wrapped. The Crafted line is sized to the floor plan, so the cabinet sequence is laid out against the actual room rather than against fixed widths.
                </p>

                <h2>Finish quality</h2>
                <p>
                  Both programs ship in the same Oppein factory finishes. A painted RTA door and a painted Crafted door come off the same production line; the difference is whether the box arrives flat or built. Request a sample door so you can see the finish in your own light; the painted colours read differently in natural light than they do on a website thumbnail.
                </p>

                <h2>When we suggest RTA</h2>
                <ul>
                  <li>The room is rectangular with standard ceiling heights.</li>
                  <li>The appliances are catalog-spec (Whirlpool, GE, Bosch, KitchenAid).</li>
                  <li>The renovation has a tight timeline and the install crew can handle on-site assembly.</li>
                  <li>You are a dealer or contractor who wants predictable margins on stocked finishes.</li>
                </ul>

                <h2>When we suggest Crafted</h2>
                <ul>
                  <li>The install crew prefers cabinets that arrive built.</li>
                  <li>The room layout doesn't fit cleanly into stepped RTA widths.</li>
                  <li>The end client wants the cabinets up and running on day one of install.</li>
                  <li>The project budget allows for the assembled premium over flat-pack.</li>
                </ul>

                <h2>A note for Ontario dealers</h2>
                <p>
                  If you carry RTA on your floor and a project walks in that fits better as a finished kitchen, both lines come from the same factory and can be quoted on a single PO. Dealer pricing applies across both programs.
                </p>

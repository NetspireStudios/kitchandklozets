            <article data-reveal>
              <header className="blog-post-head">
                <span className="eyebrow">Buyer's guide · Ontario</span>
                <h1 className="display">RTA vs Custom Kitchen Cabinets: How to Choose for Your Ontario Kitchen</h1>
                <p className="blog-post-deck">
                  Most kitchen renovations in Ontario come down to one decision before anything else gets specified: ready-to-assemble or fully custom. The right answer depends on the room, the budget, and how patient the homeowner is. Here is how we walk dealers and homeowners through it from our Sudbury shop.
                </p>
                <div className="blog-post-meta">
                  <span>By Kitch &amp; Klozets</span>
                  <span aria-hidden="true">·</span>
                  <time dateTime="2026-05-16">May 16, 2026</time>

              <div className="blog-post-body">
                <h2>The short answer</h2>
                <p>
                  Ready-to-assemble (RTA) cabinets ship flat-packed from a warehouse, get assembled on site, and finish at roughly 60 to 70% of the cost of fully custom cabinetry. Custom is drawn for one room, joined in solid hardwood, and installed by the shop that built it. Both can produce a great kitchen. The trade-offs are cost, lead time, and how much the room is willing to compromise on fit.
                </p>

                <h2>What RTA actually is</h2>
                <p>
                  RTA stands for ready-to-assemble. The cabinet boxes ship flat in cardboard, drawer hardware and door hinges arrive in labelled bags, and an installer or homeowner puts the box together with a cam-lock or dowel system in under thirty minutes. The Kitch &amp; Klozets RTA program runs in seven painted and natural-wood finish lines, with widths in three-inch increments from 9" all the way to 36" for base cabinets and corresponding widths on wall and pantry boxes.
                </p>
                <p>
                  The boxes themselves are not low-spec. The plywood option uses three-quarter-inch furniture-grade ply with a hardwood interior, dovetailed drawer boxes, and soft-close undermount slides. The particle option uses high-density particleboard with the same door, drawer, and hardware spec. Both carry a five-year warranty.
                </p>

                <h2>What "custom" means here</h2>
                <p>
                  Crafted Cabinets is our built-to-measure program. Every box is drawn for the room it will live in, joined in solid hardwood on the bench in Sudbury, finished by hand, and installed by the same two-person crew that drew it. Widths are not stepped in three-inch increments. Heights are not capped at 96". Door profiles, wood species, finish formulas, and hardware specs all get picked off menus that range much wider than the RTA program.
                </p>
                <p>
                  Custom does not mean better in every dimension. It means specified for one address. If the room is square, has standard ceilings, and the appliances are catalog items, an RTA program can produce a kitchen that is indistinguishable from a custom build at the finished install.
                </p>

                <h2>Cost: a real Ontario number</h2>
                <p>
                  As of 2026 in Ontario, a midsize kitchen (twelve to fifteen linear feet of cabinetry) lands in three rough brackets:
                </p>
                <ul>
                  <li><strong>RTA, particle board:</strong> $7,500 to $11,000 in cabinetry alone, before counters and install.</li>
                  <li><strong>RTA, plywood box:</strong> $10,000 to $15,000 for the same footprint.</li>
                  <li><strong>Crafted (built-to-measure):</strong> $28,000 to $55,000 for the same footprint, depending on wood species, hardware, and finish complexity.</li>
                </ul>
                <p>
                  Counters, appliances, lighting, plumbing, and install labour land on top of those numbers regardless of the cabinet program. A useful rule: cabinetry is roughly half the budget of a finished kitchen renovation in Ontario, so an $11,000 RTA program lives inside a kitchen that lands around $22,000 to $25,000 total, while a $40,000 crafted program lives inside a kitchen north of $80,000.
                </p>

                <h2>Lead time</h2>
                <p>
                  RTA orders from our Sudbury warehouse ship in three to five weeks. Crafted projects run about four months end to end, from first site visit to final adjustment. The four-month timeline breaks down roughly as: one week of measuring, two to three weeks of drawings, one week of material picks, eight to ten weeks on the bench, and two weeks of install plus a one-month adjustment visit.
                </p>
                <p>
                  If a renovation has a hard deadline (a new baby, a closing date, a contractor scheduled for the rest of the work), the lead-time math often points to RTA. If the project is in a heritage home or a custom build with a flexible timeline, crafted is the better fit.
                </p>

                <h2>Fit: where RTA falls short</h2>
                <p>
                  RTA programs work in three-inch width increments. That is fine for most kitchen runs, where filler strips at the ends pick up the leftover inches. It is less fine when a room has a slanted ceiling, a heritage window casing that cuts into a cabinet run, a column that needs to be wrapped, or an appliance with a non-standard depth that needs to integrate cleanly.
                </p>
                <p>
                  In those cases, the crafted line is drawn for the actual room. We cut a non-standard sink cabinet width to clear an existing plumbing line, scribe a cabinet end into a slanted ceiling, or wrap a column inside a built-in. RTA filler strips can paper over small mismatches, but past a certain threshold the room starts to look like it is wearing an off-the-rack suit.
                </p>

                <h2>Finish quality</h2>
                <p>
                  Both programs use the same conversion-varnish lacquer system on painted finishes, the same hand-applied oil on the natural-wood line, and the same soft-close hardware spec across every door and drawer. A painted RTA door and a painted crafted door pull from the same paint bench in the shop.
                </p>
                <p>
                  Where crafted pulls ahead is on grain matching, sequence-matching of veneers in a long run, and custom stain colours that are not part of the standard RTA palette. For a kitchen where the wood is the visual centerpiece, that matters. For a kitchen where the cabinetry is the background and the counter or the lighting is the focus, the difference is invisible.
                </p>

                <h2>Resale</h2>
                <p>
                  A well-installed RTA kitchen in a neutral white-shaker finish reads as a "renovated kitchen" to an Ontario home buyer. The difference between a $12,000 RTA program and a $35,000 crafted program is rarely the deciding factor on a resale. Where crafted earns its premium is in upper-end markets where buyers know to look at door tolerance, scribe fit, and drawer slide quality.
                </p>

                <h2>When we suggest RTA</h2>
                <ul>
                  <li>The room is rectangular with standard ceilings (8 ft, 9 ft, or 10 ft).</li>
                  <li>The appliances are catalog-spec (Whirlpool, GE, Bosch, KitchenAid).</li>
                  <li>The renovation has a tight timeline or a budget under $30,000 total.</li>
                  <li>The client is a dealer who wants predictable margins and stocked finishes.</li>
                </ul>

                <h2>When we suggest Crafted</h2>
                <ul>
                  <li>Heritage home with non-square corners or non-standard sightlines.</li>
                  <li>Ceiling heights above 9 ft, or vaulted / coffered ceilings that need cabinetry to terminate cleanly.</li>
                  <li>Integrated appliance panels (Sub-Zero, Miele, Fisher &amp; Paykel paneled fronts).</li>
                  <li>A library, banquette, or built-in that needs to wrap around a structural element.</li>
                  <li>Budget allows roughly 1.4× to 1.8× the RTA price for the same footprint.</li>
                </ul>

                <h2>A note for Ontario dealers</h2>
                <p>
                  If you carry RTA on your floor and a project walks in that does not fit the program, you do not need to lose the sale. Our crafted tier is available to dealers as a flagged trade line, on the same PO as the RTA program, with a coordinated lead time so the kitchen and any custom built-ins arrive together.
                </p>

                <h2>Where to start</h2>
                <p>
                  If you are an Ontario homeowner or dealer trying to decide, the easiest first step is a rough floor plan and a few photos. We can come back inside a business day with a fixed quote in either program, plus a flag if the room would be better served by the other one. There is no charge for the first conversation and no minimum order to start.
                </p>

                <p className="blog-post-deck">
                  Most renovation timelines fall apart at the cabinetry order because the order goes in too late or the lead-time estimate was optimistic. Here is what kitchen cabinet lead times actually look like in Ontario, week by week, for both our ready-to-assemble (RTA) program and the Crafted finished-kitchen line. Both come from Oppein and ship from the GTA.

                <h2>RTA: three to five weeks, every line</h2>
                <p>
                  Our RTA program ships from the GTA warehouse. Every finish line in the catalog is held at inventory level, so a typical order lands in three to five weeks from PO to delivery. The variation is mostly in three places:
                </p>
                <ul>
                  <li><strong>Order processing (week 1):</strong> we confirm the line items, flag any swaps if a width is on backorder, and lock the quote. Most orders move from quote to PO in two to four business days.</li>
                  <li><strong>Pick and pack (weeks 2-3):</strong> the warehouse pulls every box, door, and accessory into a kit, palletizes it, and labels it for shipping. A complex order (mixed finishes across two carcass options, accessories, custom-cut fillers) takes longer than a simple order.</li>
                  <li><strong>Transit (week 3-5):</strong> LTL freight to the dealer or job site. GTA to Toronto is one to two business days, GTA to Ottawa is two to three, GTA to a Northern Ontario address (Sudbury, North Bay, Sault Ste. Marie, Timmins) adds another day or two. Far-north or out-of-province orders add a week.</li>
                </ul>
                <p>
                  A practical takeaway: if you have a firm install date, place the PO at least six weeks out. The extra week is buffer for transit delays, dealer receiving days, or a damaged box that needs a replacement.
                </p>

                <h2>Crafted: roughly eight to twelve weeks</h2>
                <p>
                  Crafted is the finished-kitchen line. The cabinets are built and finished at the Oppein factory and delivered as a complete set, sized to the floor plan. The timeline runs roughly:
                </p>
                <ul>
                  <li><strong>Week 1: finish picks + floor plan.</strong> Request a sample kit, narrow your finish choices, and share a rough floor plan or measurements.</li>
                  <li><strong>Week 2: layout and quote.</strong> The order is laid out against your floor plan. We send a written quote with the finish picks, the cabinet schedule, and the delivery date.</li>
                  <li><strong>Weeks 3-10: factory production.</strong> The order is built and finished at the Oppein factory. Production windows can vary by finish; we lock the delivery date once the order is confirmed.</li>
                  <li><strong>Weeks 11-12: delivery + install.</strong> The complete set arrives at the job site labelled to the layout. Install runs in the right sequence; the cabinets arrive built so there's no on-site assembly.</li>
                </ul>
                <p>
                  Eight to twelve weeks total is a realistic Ontario timeline for the Crafted line. We confirm the date in writing on the order so the rest of the renovation can sequence around it.
                </p>

                <h2>What slows an order down</h2>
                <p>
                  Three things, in roughly the order we see them.
                </p>
                <p>
                  <strong>Indecision.</strong> The most common cause of a delayed renovation is the client adding or changing line items after the PO. An RTA order can absorb a small change in the first 48 hours; past that, every change resets the warehouse pick. On the Crafted side, changes after factory release add weeks. We try to flag this clearly at the quote stage so the schedule does not slip mid-build.
                </p>
                <p>
                  <strong>Site readiness.</strong> If the room is not framed, the floor not poured, the plumbing not roughed in, or the electrical not signed off when the cabinetry arrives, the install date slides. RTA orders can stage on a pallet in a garage for a week or two without issue, but Crafted cabinets are larger and need to be installed close to the delivery date.
                </p>
                <p>
                  <strong>Counters.</strong> Stone counter shops in Ontario typically need two to three weeks from template to install, and the template has to happen after the cabinetry is set. If the counter is on a critical path (an island that holds the sink, for example), build a three-week gap into the schedule after install for templating and stone fabrication.
                </p>

                <h2>The Ontario seasonal pattern</h2>
                <p>
                  Lead times across the Ontario cabinet industry stretch in two predictable windows. The first is January through March, when a lot of homeowners try to start a renovation right after the holidays and the dealer floor floods. The second is August through October, when buyers who closed on a house in spring try to get a kitchen done before the holidays. Mid-summer (mid-May through mid-July) and late winter (late November through December) are the most relaxed windows.
                </p>
                <p>
                  Our RTA lead time generally holds through both spikes because the warehouse is stocked. The Crafted line can stretch toward the long end of the eight-to-twelve-week window during busy seasons, depending on the factory production queue.
                </p>

                <h2>How to sequence a kitchen renovation</h2>

                  A working sequence for an Ontario kitchen renovation, assuming RTA cabinetry:
                </p>

                  <li><strong>Week -8:</strong> sign off the quote, place the PO, schedule the trades (plumbing, electrical, drywall).</li>
                  <li><strong>Week -5:</strong> demolition and rough-in starts.</li>
                  <li><strong>Week -2:</strong> drywall, paint, floor goes in.</li>
                  <li><strong>Week 0:</strong> cabinetry arrives, installer assembles boxes on site, install starts.</li>
                  <li><strong>Week +1:</strong> cabinetry is set, template for the counter.</li>
                  <li><strong>Week +3:</strong> counter installs, plumbing connects, the kitchen is functional.</li>
                </ol>
                <p>
                  For Crafted, push the timeline out by roughly five to eight extra weeks. The sample-kit request and finish picks happen during the demolition and rough-in phase.
                </p>

                <p className="blog-post-deck">
                  Most renovation timelines fall apart at the cabinetry order, because the order goes in too late or the lead-time estimate was optimistic. Here is what kitchen cabinet lead times actually look like in Ontario in 2026, week by week, for both ready-to-assemble and built-to-measure programs.

                <h2>RTA: three to five weeks, every line</h2>
                <p>
                  Our RTA program ships from a stocked warehouse in Sudbury. Every finish line in the catalog is held in inventory at the box and door level, so a typical order lands in three to five weeks from PO to delivery. The variation is mostly in three places:
                </p>
                <ul>
                  <li><strong>Order processing (week 1):</strong> we confirm the line items, flag any swaps if a width is on backorder, and lock the quote. Most orders move from quote to PO in two to four business days.</li>
                  <li><strong>Pick and pack (weeks 2-3):</strong> the warehouse pulls every box, door, and accessory into a kit, palletizes it, and labels it for shipping. This is where a complex order (eight finish swatches across two boards, accessories, custom-cut fillers) takes longer than a simple order.</li>
                  <li><strong>Transit (week 3-5):</strong> LTL freight to the dealer or job site. Sudbury to Toronto is two to three business days, Sudbury to Ottawa is one to two, Sudbury to a Northern Ontario address (North Bay, Sault Ste. Marie, Timmins) is one day. Far-north or out-of-province orders add a week.</li>
                </ul>
                <p>
                  A practical takeaway: if you have a firm install date, place the PO at least six weeks out. The extra week is buffer for transit delays, dealer receiving days, or a damaged box that needs a replacement from the warehouse.
                </p>

                <h2>Crafted: about four months end to end</h2>
                <p>
                  Built-to-measure cabinetry runs on a different clock. The timeline breaks down as:
                </p>
                <ul>
                  <li><strong>Week 1: site visit.</strong> We measure the room, photograph the existing conditions, and review the client's wishlist at the kitchen table. The free in-home visit is roughly ninety minutes.</li>
                  <li><strong>Weeks 2-3: drawings.</strong> Hand-drawn elevations are produced in the shop and brought back for review. Two rounds of mark-up are typical; the second round is when door style, hardware, and finish get locked.</li>
                  <li><strong>Week 4: material picks.</strong> Wood, stone, and hardware samples come to the site. The client holds the actual material in the actual light of the room and narrows to three combinations. We pick the final one together.</li>
                  <li><strong>Weeks 5-12: on the bench.</strong> Eight weeks of construction in the Sudbury shop. The cabinetry is photographed every Friday. Drop-by visits on Saturdays are welcome.</li>
                  <li><strong>Weeks 13-14: install.</strong> Two weeks on site with our two-person crew. The first week is rough install and scribe. The second is door fitting, hardware, and finish touch-ups.</li>
                  <li><strong>Week 18 (one month later): adjustment.</strong> We come back after the client has lived with the kitchen for a month. Drawer slides get re-tensioned, hinges adjusted, anything that has shifted gets re-set.</li>
                </ul>
                <p>
                  Sixteen to eighteen weeks total is a realistic Ontario timeline for a built-to-measure kitchen. We quote the dates in writing at the bottom of every proposal so the rest of the renovation can sequence around them.
                </p>

                <h2>What slows an order down</h2>
                <p>
                  Three things, in roughly the order we see them.
                </p>
                <p>
                  <strong>Indecision.</strong> The most common cause of a delayed renovation is the client adding or changing line items after the PO. An RTA order can absorb a small change in the first 48 hours; past that, every change resets the warehouse pick. On the crafted side, a change after the drawings are signed off restarts that portion of the schedule. We try to flag this clearly at the quote stage so the schedule does not slip mid-build.
                </p>
                <p>
                  <strong>Site readiness.</strong> If the room is not framed, the floor not poured, the plumbing not roughed in, or the electrical not signed off when the cabinetry arrives, the install date slides. RTA orders can stage on a pallet in a garage for a week or two with no issue, but crafted cabinetry should not sit boxed for more than a few days; the conditioning of the wood to the site humidity is part of the install plan.
                </p>
                <p>
                  <strong>Counters.</strong> Stone counter shops in Ontario typically need two to three weeks from template to install, and the template has to happen after the cabinetry is set. If the counter is on a critical path (an island that holds the sink, for example), build a three-week gap into the schedule after install for templating and stone fabrication.
                </p>

                <h2>The Ontario seasonal pattern</h2>
                <p>
                  Lead times across the Ontario cabinet industry stretch in two predictable windows. The first is January through March, when a lot of homeowners try to start a renovation right after the holidays and the dealer floor floods. The second is August through October, when buyers who closed on a house in spring try to get a kitchen done before the holidays. Mid-summer (mid-May through mid-July) and late winter (late November through December) are the most relaxed windows for shop scheduling.
                </p>
                <p>
                  Our RTA lead time holds steady through both spikes because the warehouse is stocked. The crafted line runs four months in the slow windows and five to six in the busy ones, simply because the bench is full.
                </p>

                <h2>How to sequence a kitchen renovation</h2>
                <p>
                  A working sequence for an Ontario kitchen renovation, assuming RTA cabinetry:
                </p>
                <ol>
                  <li><strong>Week -10:</strong> measure the room, sketch a layout, request a quote.</li>
                  <li><strong>Week -8:</strong> sign off the quote, place the PO, schedule the trades (plumbing, electrical, drywall).</li>
                  <li><strong>Week -5:</strong> demolition and rough-in starts.</li>
                  <li><strong>Week -2:</strong> drywall, paint, floor goes in.</li>
                  <li><strong>Week 0:</strong> cabinetry arrives, installer assembles boxes on site, install starts.</li>
                  <li><strong>Week +1:</strong> cabinetry is set, template for the counter.</li>
                  <li><strong>Week +3:</strong> counter installs, plumbing connects, the kitchen is functional.</li>
                </ol>
                <p>
                  For crafted, push everything out by about ten weeks. The shop visit and drawing review happen during the demolition and rough-in phase.
                </p>

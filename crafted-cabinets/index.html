  "Crafted Cabinets is our built-to-measure line. Every box is drawn to the room, joined in solid hardwood, finished by hand in the Sudbury shop, and installed by the same crew that built it. No flat-pack carcasses, no third-party finishers, no warehouse stock.",

const CRAFTED_ROOMS = [
  { title: "Bedroom", img: "/assets/crafted/room-bedroom.jpeg",

  { title: "Bedroom Wardrobe", img: "/assets/crafted/room-bedroom-wardrobe.jpeg",

  { title: "Balcony Cabinets with Bar", img: "/assets/crafted/room-balcony.jpeg",
    blurb: "Outdoor-rated cabinetry for a balcony or covered terrace. Sealed marine-grade ply with a hardwood-clad face, an integrated bar counter, and a wine fridge cutout when the run calls for it." }

const CRAFTED_FAQ = [
  { q: "How is Crafted different from the RTA Kitchen line?",
    a: "The RTA line is flat-packed, stocked in eight finishes, and built around fixed widths in 3-inch increments. Crafted is drawn to your room: any width, any height, any hardwood. RTA ships from the warehouse in three to five weeks. Crafted runs about four months, from first sketch to final adjustment, and is installed by our own crew." },

];

function Lightbox({ room, onClose }) {
  React.useEffect(() => {
    if (!room) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [room, onClose]);
  if (!room) return null;
  return (
    <div className="lightbox" onClick={onClose} role="dialog" aria-modal="true" aria-label={room.title}>
      <button className="lightbox-close" aria-label="Close" onClick={onClose}>×</button>
      <div className="lightbox-inner" onClick={(e) => e.stopPropagation()}>
        <div className="lightbox-img-wrap">
          <Img src={room.img} alt={room.title} w={1600}/>
        </div>
        <div className="lightbox-caption">
          <h3 className="display">{room.title}</h3>
          <p>{room.blurb}</p>
        </div>
      </div>
    </div>
  );
}

function App() {

  const [openFaq, setOpenFaq] = React.useState(0);
  const [lightboxRoom, setLightboxRoom] = React.useState(null);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

    <>

            </div>
          </div>
        </section>

                <p>Crafted Cabinets is the made-to-measure side of the shop. Every project is drawn for one home, built on the bench in Sudbury, and installed by the same crew that drew it. Kitchens, vanities, mudrooms, libraries, and the rooms that won't take a flat-pack kit.</p>
                <p>The line is built around customization. Wood species, finish, hardware, door profile, sightline, scribe. All of it gets drawn before the saw runs. If your room has a slanted ceiling, a heritage window casing, or a corner that sits a sixteenth off-square, the cabinetry is cut for that room and no other.</p>
                <p>The process is collaborative. First conversation is at your kitchen table. Second is hand-drawn elevations marked up at the same table. Third is a tray of wood and stone samples sitting in your light, in your room. Nothing is committed until the three of you agree.</p>
                <p>Crafted Cabinets sit alongside the RTA program as the made-to-measure tier. Same shop, same five-year warranty, same dovetailed drawer boxes and soft-close hardware. What changes is fit. Every joint is drawn for one address.</p>
                <a className="btn btn-walnut crafted-intro-cta" href="/contact">Contact us to learn more <span className="arrow">→</span></a>
              </div>
              <figure className="crafted-intro-img">
                <img src="/assets/crafted/crafted-intro.png" alt="Crafted bedroom cabinetry installation" loading="lazy"/>
              </figure>
            </section>

            <section className="crafted-rooms-section" data-reveal>
              <p className="crafted-rooms-intro">
                Materials matter as much as the drawing. The Crafted line works in classic hardwoods and modern composites, picked to match your taste and the way the room gets used. A few examples below.
              </p>
              <div className="crafted-rooms-grid">

                  <button key={i} type="button"
                          className="crafted-room-card crafted-room-card-btn"
                          onClick={() => setLightboxRoom(r)}
                          aria-label={`Open ${r.title} image`}>
                    <h3 className="display">{r.title}</h3>
                    <div className="crafted-room-thumb"
                         style={{ background: "linear-gradient(160deg, #3B2A1E, #1c130a)" }}>
                      {r.img
                        ? <img src={r.img} alt={r.title} loading="lazy"/>
                        : <CabinetOverlay opacity={0.28}/>}
                      <span className="crafted-room-zoom" aria-hidden="true">⤢</span>
                    </div>

            </section>

            <section className="materials-copy" data-reveal>

              <h2 className="display">Hardwoods, plywood, and hand-applied finishes.</h2>
              <p>
                Doors and drawer fronts are joined in black walnut, rift white oak, cherry, hard maple, ebonized ash, or reclaimed chestnut. Boxes are 3/4-inch furniture-grade plywood with hardwood interiors. Hinges, slides, and pulls are spec-matched across the run. Finishes are hand-applied in the shop: oil, wax, milk paint, conversion-varnish lacquer, and a small set of fumed and cerused options. We pick three combinations together before any wood is cut.
              </p>
            </section>

            <section className="faq-accordion-section" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">Common questions</span>

    </>
  );

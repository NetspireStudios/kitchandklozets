<script type="text/babel" data-presets="react">
const CRAFTED_VALUES = [
  "Crafted Cabinets is our built-to-measure line. Every box is drawn to the room, joined in solid hardwood, finished by hand in the Sudbury shop, and installed by the same crew that built it. No flat-pack carcasses, no third-party finishers, no warehouse stock.",
  "We treat the room as a single piece of furniture. Sightlines, returns, scribe panels, and trim are drawn on the elevation before we cut anything. The kitchen, the vanity, the closet, and the built-in next to the fireplace all read as one project rather than six.",
  "Drawn for one address at a time. Quoted as one number, in writing, before the saw runs. Built on a fixed bench schedule, photographed each week, and warrantied for five years on the joint, the finish, and the hardware."
];

const CRAFTED_ROOMS = [
  { title: "Custom Kitchen", img: "1556909114-f6e7ad7d3136",
    blurb: "A working kitchen drawn to your floor plan. Solid-hardwood doors and drawer fronts, plywood carcass, dovetailed drawer boxes. Shaker, inset, beaded inset, or slab; painted or oiled." },
  { title: "Bath Vanity", img: "1584622650111-993a426fbf0a",
    blurb: "Single and double vanities with integrated stone tops, concealed under-mount outlets, and undermount full-extension drawer slides. Designed to clear the plumbing rather than around it." },
  { title: "Mudroom", img: "1582268611958-ebfd161ef9cf",
    blurb: "Lockers, bench seating, bootlines, dog showers, and the integrated coat hooks that make the back hall actually work for the family that uses it." },
  { title: "Pantry", img: "1556909195-4d33aa56a8e6",
    blurb: "Walk-in and butler's pantries with adjustable shelving, a counter-height workstation, and an appliance garage when there's a row of small appliances to hide." },
  { title: "Built-Ins", img: "1505691938895-1758d7feb511",
    blurb: "Libraries, window seats, banquettes, and media walls. Floor to ceiling, drawn to the room, finished in the shop and installed in two clean days." },
  { title: "Bedroom & Wardrobe", img: "1565538810643-b5bdb714032a",
    blurb: "Wardrobe walls, fitted dressers, headboard walls with integrated reading lights, and bed surrounds. Sold alongside the closet line as a single bedroom package." }
];

const CRAFTED_FAQ = [
  { q: "How is Crafted different from the RTA Kitchen line?",
    a: "The RTA line is flat-packed, stocked in eight finishes, and built around fixed widths in 3-inch increments. Crafted is drawn to your room: any width, any height, any hardwood. RTA ships from the warehouse in three to five weeks. Crafted runs about four months, from first sketch to final adjustment, and is installed by our own crew." },
  { q: "What's the price range for a crafted project?",
    a: "A built-to-measure kitchen typically falls between forty-five and a hundred and twenty thousand, depending on size, wood species, and hardware. A vanity, mudroom, or library runs roughly twelve to thirty. We send a fixed written quote after the first set of measured drawings, not a moving estimate." },
  { q: "Where do you work?",
    a: "We build for homes in Greater Sudbury and across Northern Ontario, with select projects in the GTA when the room is the right fit. The shop is on Lasalle Boulevard in Sudbury; we install with our own two-person crew and don't subcontract joinery, finishing, or fitting." }
];

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [openFaq, setOpenFaq] = React.useState(0);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Crafted Cabinets" }]}/>

            <header className="cat-hero cat-hero-centered" data-reveal>
              <span className="eyebrow">Crafted Cabinets · built to measure</span>
              <h1 className="display">Cabinetry drawn to the room.</h1>
              <p className="cat-lede">
                A built-to-measure line for the kitchen, bath, mudroom, pantry, library, and bedroom. Solid hardwood throughout. Hand-finished in the Sudbury shop and installed by the crew that built it.
              </p>
              <div className="hero-ctas" style={{ marginTop: 28 }}>
                <a className="btn btn-walnut" href="/contact">Start a project <span className="arrow">→</span></a>
                <a className="btn btn-ghost" href="tel:+15483331419">Call (548) 333-1419</a>
              </div>
            </header>

            <section className="feature-value" data-reveal>
              {CRAFTED_VALUES.map((p, i) => (
                <p key={i} className="feature-value-p">{p}</p>
              ))}
            </section>

            <section className="crafted-rooms-section" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">Where Crafted goes</span>
                <h2 className="display">Six rooms, one workshop.</h2>
              </header>
              <div className="crafted-rooms-grid">
                {CRAFTED_ROOMS.map((r, i) => (
                  <article key={i} className="crafted-room-card">
                    <div className="crafted-room-thumb ph"
                         style={{ background: "linear-gradient(160deg, #3B2A1E, #1c130a)" }}>
                      {r.img
                        ? <Img src={r.img} alt={r.title} w={600}/>
                        : <CabinetOverlay opacity={0.28}/>}
                    </div>
                    <h3 className="display">{r.title}</h3>
                    <p>{r.blurb}</p>
                  </article>
                ))}
              </div>
            </section>

            <section className="materials-copy" data-reveal>
              <span className="eyebrow">Materials</span>
              <h2 className="display">Hardwoods, plywood, and hand-applied finishes.</h2>
              <p>
                Doors and drawer fronts are joined in black walnut, rift white oak, cherry, hard maple, ebonized ash, or reclaimed chestnut. Boxes are 3/4-inch furniture-grade plywood with hardwood interiors. Hinges, slides, and pulls are spec-matched across the run. Finishes are hand-applied in the shop: oil, wax, milk paint, conversion-varnish lacquer, and a small set of fumed and cerused options. We pick three combinations together before any wood is cut.
              </p>
            </section>

            <section className="faq-accordion-section" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">Common questions</span>
                <h2 className="display">Three things people ask first.</h2>
              </header>
              <div className="faq-list">
                {CRAFTED_FAQ.map((item, i) => (
                  <details key={i} className="faq-item" open={openFaq === i}
                    onToggle={(e) => { if (e.currentTarget.open) setOpenFaq(i); }}>
                    <summary>
                      <span className="faq-num">{String(i + 1).padStart(2, "0")}</span>
                      <span className="faq-q">{item.q}</span>
                      <span className="faq-mark">＋</span>
                    </summary>
                    <div className="faq-a">{item.a}</div>
                  </details>
                ))}
              </div>
            </section>
          </div>
        </section>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

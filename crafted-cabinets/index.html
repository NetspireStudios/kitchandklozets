const CRAFTED_FAQ = [
  { q: "How is Crafted different from the RTA Kitchen line?",
    a: "The RTA line is flat-packed and stocked in eight finishes, built around fixed widths in 3-inch increments. Crafted is the finished-kitchen line: full rooms delivered ready to install, in finishes and configurations that don't fit the stock RTA set. Both ship from the GTA." },

  { q: "Where do you ship?",

];

function Lightbox({ room, onClose }) {
  React.useEffect(() => {
    if (!room) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [room, onClose]);
  if (!room) return null;
  return (
    <div className="lightbox" onClick={onClose} role="dialog" aria-modal="true" aria-label={room.title}>
      <button className="lightbox-close" aria-label="Close" onClick={onClose}>×</button>
      <div className="lightbox-inner" onClick={(e) => e.stopPropagation()}>
        <div className="lightbox-img-wrap">
          <Img src={room.img} alt={room.title} w={1600}/>
        </div>
        <div className="lightbox-caption">
          <h3 className="display">{room.title}</h3>
          <p>{room.blurb}</p>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [openFaq, setOpenFaq] = React.useState(0);
  const [lightboxRoom, setLightboxRoom] = React.useState(null);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">

            </div>
          </div>
        </section>

        <section className="catalog-page">

                <p>Crafted Cabinets is our finished-kitchen line. Full kitchens built at the factory and delivered ready to install, in finishes and configurations that don't fit the eight stock RTA lines.</p>

                <p>Same support as the RTA program. Sample doors and finish chips ship to your door so you can see what fits your room before placing the order.</p>
                <a className="btn btn-walnut crafted-intro-cta" href="/contact">Contact us to learn more <span className="arrow">→</span></a>
              </div>
              <figure className="crafted-intro-img">
                <img src="/assets/crafted/crafted-intro.png" alt="Finished kitchen cabinetry installation" loading="lazy"/>
              </figure>
            </section>

            <section className="crafted-rooms-section" data-reveal>
              <p className="crafted-rooms-intro">
                The Crafted line covers more than kitchens. Finished cabinetry for bedrooms, wardrobes, media walls, panelled feature walls, entrances, and outdoor bars. A few examples below.
              </p>
              <div className="crafted-rooms-grid">
                {CRAFTED_ROOMS.map((r, i) => (
                  <button key={i} type="button"
                          className="crafted-room-card crafted-room-card-btn"
                          onClick={() => setLightboxRoom(r)}
                          aria-label={`Open ${r.title} image`}>
                    <h3 className="display">{r.title}</h3>
                    <div className="crafted-room-thumb"
                         style={{ background: "linear-gradient(160deg, #3B2A1E, #1c130a)" }}>
                      {r.img
                        ? <img src={r.img} alt={r.title} loading="lazy"/>
                        : <CabinetOverlay opacity={0.28}/>}
                      <span className="crafted-room-zoom" aria-hidden="true">⤢</span>
                    </div>
                  </button>
                ))}
              </div>
            </section>

            <section className="materials-copy" data-reveal>
              <span className="eyebrow">Materials</span>
              <h2 className="display">Factory finishes, soft-close hardware, ready to install.</h2>
              <p>
                Boxes ship pre-built with edge-banded interiors. Doors and drawer fronts arrive in the finish you picked from samples. Soft-close hinges and drawer slides are spec-matched across the order. Everything is labelled to the floor plan so install runs in the right sequence.
              </p>
            </section>

            <section className="faq-accordion-section" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">Common questions</span>

              <div className="faq-list">

                    <summary>
                      <span className="faq-num">{String(i + 1).padStart(2, "0")}</span>
                      <span className="faq-q">{item.q}</span>
                      <span className="faq-mark">＋</span>
                    </summary>
                    <div className="faq-a">{item.a}</div>
                  </details>
                ))}
              </div>
            </section>
          </div>
        </section>
        <CTA/>
      </main>
      <Footer/>
      <Lightbox room={lightboxRoom} onClose={() => setLightboxRoom(null)}/>
    </>
  );
}

<script type="text/babel" data-presets="react">
const CRAFTED_ROOMS = [
  { title: "Custom Kitchen",     img: "1556909114-f6e7ad7d3136",
    blurb: "Built-to-measure kitchen cabinetry in solid hardwood, drawn to the room rather than picked from fixed widths. Shaker, inset, or slab doors; painted or stained." },
  { title: "Custom Bath Vanity", img: "1584622650111-993a426fbf0a",
    blurb: "Single and double vanities in solid hardwood with integrated stone tops, concealed under-mount outlets, and undermount full-extension drawer slides." },
  { title: "Custom Mudroom",     img: "1582268611958-ebfd161ef9cf",
    blurb: "Lockers, bench seating, bootlines, dog showers, and the integrated coat hooks that make the back hall actually work for a family." },
  { title: "Custom Pantry",      img: "1556909195-4d33aa56a8e6",
    blurb: "Walk-in and butler's pantries with adjustable shelving, a counter-height workstation, and an appliance garage when there's a row of small appliances to hide." },
  { title: "Custom Built-Ins",   img: "1505691938895-1758d7feb511",
    blurb: "Libraries, window seats, banquettes, and media walls. Floor to ceiling, drawn to the room and finished in the shop." },
  { title: "Custom Bedroom",     img: "1565538810643-b5bdb714032a",
    blurb: "Wardrobe walls, fitted dressers, headboard walls with integrated reading lights, and bed surrounds. Sold alongside the closet line as a single bedroom package." }
];

const CRAFTED_PROCESS = [
  { n: "01", t: "Site visit",     d: "Coffee, measurements, your wishlist on a yellow pad. We sketch the constraints on the spot." },
  { n: "02", t: "Drawings",       d: "Hand-drawn elevations within two to three weeks. We bring them by and mark them up at your table." },
  { n: "03", t: "Materials",      d: "You hold the wood, the stone, and the hardware in your hand. We narrow to three combinations." },
  { n: "04", t: "On the bench",   d: "Built in the Watertown shop. Photographed weekly. Drop by Saturdays if you want to see a piece in progress." },
  { n: "05", t: "Install",        d: "Two weeks on site. Final adjustments after a month of real life with the room." }
];

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Crafted Cabinets" }]}/>
            <header className="cat-hero" data-reveal>
              <span className="eyebrow">Crafted Cabinets · signature line</span>
              <h1 className="display">When the room won't fit a flat-pack kit.</h1>
              <p className="cat-lede">
                Built-to-measure cabinetry for the kitchen, bath, mudroom, pantry, library, and bedroom. Sold direct to homeowners through our own installers, and offered to dealers as a fully-finished custom tier alongside the RTA program.
              </p>
              <div className="hero-ctas" style={{ marginTop: 28 }}>
                <a className="btn btn-walnut" href="/contact">Start a project <span className="arrow">→</span></a>
                <a className="btn btn-ghost" href="tel:+15483331419">Call (548) 333-1419</a>
              </div>
            </header>

            <div className="crafted-rooms-grid" data-reveal>
              {CRAFTED_ROOMS.map((r, i) => (
                <article key={i} className="crafted-room-card">
                  <div className="crafted-room-thumb ph"
                       style={{ background: "linear-gradient(160deg, #3B2A1E, #1c130a)" }}>
                    {r.img
                      ? <Img src={r.img} alt={r.title} w={600}/>
                      : <CabinetOverlay opacity={0.28}/>}
                  </div>
                  <h3 className="display">{r.title}</h3>
                  <p>{r.blurb}</p>
                </article>
              ))}
            </div>

            <div className="crafted-process" data-reveal>
              <header className="crafted-process-head">
                <span className="eyebrow">How a crafted project runs</span>
                <h2 className="display">Five stages. Four months end to end.</h2>
              </header>
              <ol className="steps-list">
                {CRAFTED_PROCESS.map((s, i) => (
                  <li key={i} className="step-item" style={{ "--delay": `${i * 100}ms` }}>
                    <span className="step-num">{s.n}</span>
                    <div>
                      <h3 className="display">{s.t}</h3>
                      <p>{s.d}</p>
                    </div>
                  </li>
                ))}
              </ol>
            </div>
          </div>
        </section>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

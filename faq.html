<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What's the difference between the RTA line and Crafted Cabinets?",
      "acceptedAnswer": { "@type": "Answer", "text": "The RTA line is flat-packed and stocked in eight finishes, built around fixed widths in 3-inch increments. Crafted is the finished-kitchen line: full rooms delivered ready to install in finishes that don't fit the stock RTA set. Both ship from the GTA." }
    },
    {
      "@type": "Question",
      "name": "How long until my cabinets arrive?",
      "acceptedAnswer": { "@type": "Answer", "text": "RTA orders ship in three to five weeks. Crafted finished kitchens run eight to twelve weeks from confirmed order to delivery." }
    },
    {
      "@type": "Question",
      "name": "Can I see the finishes before ordering?",
      "acceptedAnswer": { "@type": "Answer", "text": "Yes. Sample doors and finish chips ship to your door on request so you can see the colour and feel the door style in your own room before placing the order. Sales hours are 9am to 5pm, seven days a week." }
    },
    {
      "@type": "Question",
      "name": "Where do you ship?",
      "acceptedAnswer": { "@type": "Answer", "text": "Across Ontario and Eastern Canada from the GTA. Freight is quoted on request based on the order and the postal code." }
    },
    {
      "@type": "Question",
      "name": "Do I need to be a dealer to order RTA cabinets?",
      "acceptedAnswer": { "@type": "Answer", "text": "No. We sell directly to homeowners, designers, and contractors, with dealer pricing available for trade accounts." }
    }
  ],
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://kitchandklozets.com/" },
      { "@type": "ListItem", "position": 2, "name": "FAQ" }
    ]
  }
}
</script>
</head>
<body style="background-color: rgb(250, 238, 223)">
<a href="#top" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to content</a>
<div id="root"></div>

<script type="text/babel" src="/data.jsx"></script>
<script type="text/babel" src="/catalog-data.jsx"></script>
<script type="text/babel" src="/utils.jsx"></script>
<script type="text/babel" src="/top.jsx"></script>
<script type="text/babel" src="/middle.jsx"></script>
<script type="text/babel" src="/bottom.jsx"></script>
<script type="text/babel" src="/catalog.jsx"></script>

<script type="text/babel" data-presets="react">
const FAQ_ALL = [
  ...FAQ_ITEMS,
  { q: "Where do you ship?",
    a: "Across Ontario and Eastern Canada from the GTA. Freight is quoted on request based on the order and the postal code." },
  { q: "How do payments work?",
    a: "A deposit secures the order and locks the finish picks. The balance is due before the order ships from our warehouse. We confirm the exact split in writing on the quote." },
  { q: "What's your warranty?",
    a: "Standard manufacturer warranty on the cabinets, hardware, and finish. Specifics depend on the line; we walk through the warranty in writing on the order confirmation." }
];

function FAQPage() {
  const [open, setOpen] = React.useState(0);
  return (
    <section className="catalog-page faq">
      <div className="container">
        <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "FAQ" }]}/>
        <header className="cat-hero" data-reveal>
          <span className="eyebrow">Common questions</span>
          <h1 className="display">What homeowners ask us first.</h1>
          <p className="cat-lede">
            Lead times, shipping, samples, warranty. Short answers below. If yours isn't here, send a note and we'll reply within one business day.
          </p>
        </header>

        <div className="faq-list" data-reveal>
          {FAQ_ALL.map((item, i) => (
            <details key={i} className="faq-item" open={open === i}
              onToggle={(e) => { if (e.currentTarget.open) setOpen(i); }}>
              <summary>
                <span className="faq-num">{String(i + 1).padStart(2, "0")}</span>
                <span className="faq-q">{item.q}</span>
                <span className="faq-mark">＋</span>
              </summary>
              <div className="faq-a">{item.a}</div>
            </details>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <FAQPage/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "How much do custom kitchen cabinets cost in Ontario?",
      "acceptedAnswer": { "@type": "Answer", "text": "A custom solid-hardwood kitchen from Kitch & Klozets typically runs $45,000 to $120,000 depending on size, wood species, and hardware. A free in-home consultation gives you a real number against your floor plan; we send a fixed quote within two weeks." }
    },
    {
      "@type": "Question",
      "name": "How long does a custom kitchen or closet project take?",
      "acceptedAnswer": { "@type": "Answer", "text": "About four months end to end. One week of site measurement, two to three weeks of hand-drawn elevations, one week of material picks, eight to ten weeks on the bench in our Sudbury shop, and two weeks of on-site install. We quote a date and hold it." }
    },
    {
      "@type": "Question",
      "name": "What's the difference between custom, semi-custom, and stock cabinets?",
      "acceptedAnswer": { "@type": "Answer", "text": "Stock cabinets are pre-built in fixed sizes with stapled MDF carcasses. Semi-custom lets you pick a finish but still uses modular boxes. Custom is drawn to your exact room, joined in solid hardwood, and finished by hand in our shop." }
    },
    {
      "@type": "Question",
      "name": "What wood species and door styles do you offer?",
      "acceptedAnswer": { "@type": "Answer", "text": "Six FSC-certified hardwoods sourced within 300 miles of the shop: black walnut, rift white oak, cherry, hard maple, ebonized ash, and reclaimed chestnut. Door styles include shaker, inset, beaded inset, and slab. Finishes are hand-applied." }
    },
    {
      "@type": "Question",
      "name": "Do you handle the full remodel or just build the cabinetry?",
      "acceptedAnswer": { "@type": "Answer", "text": "We build, finish, and install all the cabinetry, vanities, built-ins, and millwork. For full remodels involving electrical, plumbing, flooring, or stonework, we coordinate with a short list of licensed Greater Sudbury contractors." }
    },
    {
      "@type": "Question",
      "name": "What service area do you cover?",
      "acceptedAnswer": { "@type": "Answer", "text": "Northern Ontario: Sudbury (our HQ), North Bay, Timmins, Sault Ste. Marie, Greater Sudbury, Espanola, Manitoulin, the North Shore, and the South Shore. We've shipped pieces as far as northern Ontario and Quebec for repeat clients." }
    },
    {
      "@type": "Question",
      "name": "Do you require a deposit?",
      "acceptedAnswer": { "@type": "Answer", "text": "Yes. A signed quote is held with a 30% deposit that covers materials ordering. The next 40% is due when the cabinetry leaves the shop; the final 30% is due after install and a one-month adjustment visit." }
    },
    {
      "@type": "Question",
      "name": "What's your warranty?",
      "acceptedAnswer": { "@type": "Answer", "text": "Five years on the joint, the finish, and the hardware. If a joint fails in normal use, we return to repair or replace at no cost. Replacement parts ship from stock the same week they're requested." }
    }
  ],
  "breadcrumb": {

      { "@type": "ListItem", "position": 2, "name": "FAQ" }
    ]
  }
}

<script type="text/babel" data-presets="react">
const FAQ_ALL = [
  ...FAQ_ITEMS,
  { q: "What service area do you cover?",
    a: "Northern Ontario: Sudbury (our HQ), North Bay, Timmins, Sault Ste. Marie, Greater Sudbury, Espanola, Manitoulin, and beyond. We've shipped pieces as far as northern Ontario and Quebec for repeat clients." },
  { q: "Do you require a deposit?",
    a: "Yes. A signed quote is held with a 30% deposit that covers materials ordering. The next 40% is due when the cabinetry leaves the shop; the final 30% is due after install and a one-month adjustment visit." },
  { q: "What's your warranty?",
    a: "Five years on the joint, the finish, and the hardware. If a joint fails in normal use, we return to repair or replace at no cost. Replacement parts ship from stock the same week they're requested." }
];

function FAQPage() {
  const [open, setOpen] = React.useState(0);
  return (
    <section className="catalog-page faq">
      <div className="container">
        <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "FAQ" }]}/>
        <header className="cat-hero" data-reveal>
          <span className="eyebrow">Common questions</span>
          <h1 className="display">What homeowners ask us first.</h1>
          <p className="cat-lede">
            Pricing, lead time, materials, scope, warranty. The same answers we'd give you at the kitchen table, just typed out. If your question isn't here, call the shop.
          </p>
        </header>

        <div className="faq-list" data-reveal>
          {FAQ_ALL.map((item, i) => (
            <details key={i} className="faq-item" open={open === i}
              onToggle={(e) => { if (e.currentTarget.open) setOpen(i); }}>
              <summary>
                <span className="faq-num">{String(i + 1).padStart(2, "0")}</span>
                <span className="faq-q">{item.q}</span>
                <span className="faq-mark">＋</span>
              </summary>
              <div className="faq-a">{item.a}</div>
            </details>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <FAQPage/>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

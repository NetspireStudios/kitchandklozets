    blurb: "Free-standing wardrobe wall in 10, 12, and 14-foot widths, fitted with hanging, drawer, and shoe sections for bedrooms without built-in closets." },
  { title: "His and Hers Walk-In",
    blurb: "Pair of mirrored walk-in kits flanking a central island. Two drawer towers per side, double-hang sections, and a shared shoe ladder at the back wall." },
  { title: "Dressing-Room Island",
    blurb: "Stand-alone island for an existing walk-in. Stone-ready top deck, two drawer banks, and a shared cabinet at the foot." },
  { title: "Pantry Closet Kit",
    blurb: "Six-foot reach-in kit configured for pantry use: adjustable shelves, a counter-height workstation, and an appliance garage with a tambour door." }
];

const CLOSET_SPECS = [
  { eyebrow: "Construction", title: "Plywood box, solid-hardwood fronts",
    blurb: "All-wood construction. No MDF carcass. Dovetailed drawer boxes on undermount soft-close slides; the same hardware spec as the RTA kitchen line." },
  { eyebrow: "Finish options", title: "Eight finishes, all from the RTA palette",

  { eyebrow: "Lead time", title: "3 to 5 weeks, ships on the same truck",
    blurb: "Closet and kitchen orders consolidate at the warehouse. One pallet, one delivery window, one PO. Dealer pricing tier carries across both lines." },
  { eyebrow: "Warranty", title: "Five years on every joint and slide",
    blurb: "Same coverage as the kitchen program: five years on hardware, five on the joint, five on the finish. We carry replacement parts from stock." }
];

function App() {
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in-view"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll("[data-reveal]:not(.in-view)").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav onMenu={() => setDrawerOpen(true)}/>
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)}/>
      <main id="top">
        <section className="catalog-page">
          <div className="container">
            <Breadcrumbs items={[{ label: "Home", href: "/" }, { label: "Closet Line" }]}/>

              <span className="eyebrow">Closet Line · dealer-direct</span>
              <h1 className="display">Closet systems that ship on the same truck.</h1>
              <p className="cat-lede">
                Wholesale closet systems for the bedroom, entry, and bath. Drawer banks, hanging rails, shoe ladders, and island add-ons that share hardware with the RTA kitchen line, so a single delivery covers both rooms.

              <div className="hero-ctas" style={{ marginTop: 28 }}>

              </div>
            </header>

                  <div className="closet-config-num">{String(i + 1).padStart(2, "0")}</div>
                  <h3 className="display">{c.title}</h3>
                  <p>{c.blurb}</p>
                </article>
              ))}
            </div>

            <div className="closet-specs" data-reveal>
              <header className="closet-specs-head">
                <span className="eyebrow">What's in the line</span>
                <h2 className="display">Built to the same spec as the kitchens.</h2>
              </header>
              <div className="closet-specs-grid">
                {CLOSET_SPECS.map((s, i) => (
                  <div key={i} className="closet-spec-card">
                    <span className="eyebrow">{s.eyebrow}</span>
                    <h3 className="display">{s.title}</h3>
                    <p>{s.blurb}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
        <CTA/>
      </main>
      <Footer/>
    </>
  );
}
